<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
       <div class="sidebar">
        <h2>Dashboard</h2>
        <a href="home.html">Home</a>
        <a href="students.html">Students</a>
        <a href="setting.html" class="active">Settings</a>
        <a href="logout.html">Logout</a>
    </div>

    <div class="main-content">
        <div class="header-banner">
            Settings
        </div>
        
        <div class="card-container" style="text-align: left;">
            <h3 style="margin-bottom: 25px;">Profile Settings</h3>
             
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Your username">
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Your email address">
            </div>
            
            <div class="form-group">
                <label>Theme</label>
                <select>
                    <option>Dark</option>
                    <option>Light</option>
                </select>
            </div>
            
            <button class="btn btn-edit" style="padding: 12px 25px;">Save Settings</button>
        </div>
    </div> 
</body>
</html>
